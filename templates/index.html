<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO — Список задач</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="noise"></div>

  <main class="app">

    <header class="header">
      <div class="header__label">ЗАДАЧИ</div>
      <h1 class="header__title">Список задач</h1>
    </header>

    <section class="input-section">
      <div class="input-wrap">
        <input
          id="taskInput"
          class="task-input"
          type="text"
          placeholder="Добавить новую задачу..."
          autocomplete="off"
          maxlength="200"
        />
        <button id="addBtn" class="add-btn" aria-label="Добавить задачу">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <line x1="10" y1="2" x2="10" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="2" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div id="errorMsg" class="error-msg" aria-live="polite"></div>
    </section>

    <nav class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="active">Активные</button>
      <button class="filter-btn" data-filter="done">Завершённые</button>
    </nav>

    <div class="tasks-container">
      <ul id="taskList" class="task-list"></ul>
      <div id="emptyState" class="empty-state hidden">
        <p>Задач нет. Самое время добавить!</p>
      </div>
    </div>

    <footer class="footer">
      <span id="countLabel" class="count-label"></span>
      <button id="clearDoneBtn" class="clear-btn hidden">Удалить завершённые</button>
    </footer>

  </main>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
