<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Твой список задач</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <main class="app">
    <header class="header">
      <h1 class="header__title">Список задач</h1>
    </header>

    <section class="input-section">
      <div class="input-wrap">
        <input
          id="taskInput"
          class="task-input"
          type="text"
          placeholder="Добавить новую задачу..."
          autocomplete="off"
          maxlength="200"
        />
        <button id="addBtn" class="add-btn" aria-label="Добавить задачу">+</button>
      </div>
      <div id="errorMsg" class="error-msg"></div>
    </section>

    <nav class="filters">
      <button class="filter-btn active" data-filter="all">Все</button>
      <button class="filter-btn" data-filter="active">Активные</button>
      <button class="filter-btn" data-filter="done">Завершённые</button>
    </nav>

    <div class="tasks-container">
      <ul id="taskList" class="task-list"></ul>
      <div id="emptyState" class="empty-state hidden">
        <p>Задач нет. Самое время добавить!</p>
      </div>
    </div>

    <footer class="footer">
      <span id="countLabel" class="count-label"></span>
      <button id="clearDoneBtn" class="clear-btn hidden">Удалить завершённые</button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
